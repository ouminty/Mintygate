<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Access</title>
<style>
  /* Animated black-to-gray gradient background */
  body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(-45deg, #000000, #2f2f2f, #7f7f7f, #2f2f2f);
    background-size: 400% 400%;
    animation: gradientBG 20s ease infinite;
    overflow: hidden;
  }

  @keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
  }

  canvas#particles {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  #container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 40px;
    border-radius: 15px;
    background: rgba(0,0,0,0.85);
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    color: white;
    width: 360px;
    max-width: 90%;
  }

  h2 {
    font-weight: 400;
    margin-bottom: 20px;
    letter-spacing: 1px;
  }

  input, textarea {
    padding: 12px;
    font-size: 16px;
    margin-top: 10px;
    width: 100%;
    border: none;
    border-radius: 8px;
    outline: none;
    background: rgba(255,255,255,0.1);
    color: white;
    backdrop-filter: blur(5px);
  }

  input::placeholder, textarea::placeholder {
    color: rgba(255,255,255,0.6);
  }

  button {
    padding: 12px 0;
    font-size: 16px;
    margin-top: 15px;
    cursor: pointer;
    border: none;
    border-radius: 8px;
    width: 100%;
    background: #444;
    color: white;
    font-weight: 500;
    transition: 0.3s;
  }

  button:hover {
    background: #666;
  }

  #msg {
    color: #ff4d4d;
    margin-top: 12px;
    font-weight: 500;
  }

  #chatBox {
    margin-top: 20px;
    text-align: left;
    max-height: 300px;
    overflow-y: auto;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 10px;
    border-radius: 8px;
    background: rgba(255,255,255,0.05);
  }

  .chatMessage {
    margin-bottom: 10px;
    line-height: 1.4;
  }

  .chatMessage.user {
    text-align: right;
    color: #a0e0ff;
  }

  .chatMessage.bot {
    text-align: left;
    color: #f5f5a0;
  }

</style>
</head>
<body>

<canvas id="particles"></canvas>

<div id="container">
  <h2>Enter Access Code</h2>
  <input type="text" id="code" placeholder="Enter code">
  <button onclick="checkCode()">Enter</button>
  <p id="msg"></p>

  <!-- Chat interface -->
  <div id="chatInterface" style="display:none;">
    <h2>MintyGate Chat</h2>
    <div id="chatBox"></div>
    <textarea id="chatInput" placeholder="Type your message..." rows="2"></textarea>
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
/* Access code check */
function checkCode() {
  const input = document.getElementById('code').value.toLowerCase();
  const msg = document.getElementById('msg');

  if(input === "garbo") {
    window.open("https://mintyportal.company.site", "_blank");
  } 
  else if(input === "yt") {
    window.open("https://www.youtube.com", "_blank");
  } 
  else if(input === "fox") {
    window.open("https://discord.com/invite/8bRMGXXqXs", "_blank");
  } 
  else if(input === "teeza") {
    window.open("https://dashboard.botghost.com/dashboard/modules", "_blank");
  }
  else if(input === "chatgpt") {
    msg.textContent = "💬 Access granted! Chat panel unlocked.";
    document.getElementById('chatInterface').style.display = 'block';
    document.getElementById('code').style.display = 'none';
  }
  else {
    msg.textContent = "❌ Wrong code, try again!";
  }
}

/* ChatGPT integration */
function appendMessage(sender, text) {
  const chatBox = document.getElementById('chatBox');
  const div = document.createElement('div');
  div.className = 'chatMessage ' + sender;
  div.textContent = text;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function sendMessage() {
  const inputEl = document.getElementById('chatInput');
  const message = inputEl.value.trim();
  if(!message) return;
  appendMessage('user', message);
  inputEl.value = '';

  // Send message to MintyGate ChatGPT backend
  fetch("https://chatgpt-backend-65am.onrender.com/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: message })
  })
  .then(res => res.json())
  .then(data => {
    const reply = data.reply || JSON.stringify(data);
    appendMessage('bot', reply);
  })
  .catch(err => {
    console.error(err);
    appendMessage('bot', "❌ Failed to connect to ChatGPT.");
  });
}

/* Particle effect */
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particlesArray = [];
const colors = ['rgba(255,255,255,0.1)','rgba(255,255,255,0.2)','rgba(255,255,255,0.15)'];
const maxParticles = 100;

class Particle {
  constructor(){
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.radius = Math.random() * 2 + 1;
    this.speedX = (Math.random() - 0.5) * 0.5;
    this.speedY = (Math.random() - 0.5) * 0.5;
    this.color = colors[Math.floor(Math.random()*colors.length)];
  }
  update(){
    this.x += this.speedX;
    this.y += this.speedY;
    if(this.x < 0 || this.x > canvas.width) this.speedX = -this.speedX;
    if(this.y < 0 || this.y > canvas.height) this.speedY = -this.speedY;
  }
  draw(){
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
    ctx.fillStyle = this.color;
    ctx.fill();
  }
}

function initParticles(){
  particlesArray = [];
  for(let i=0;i<maxParticles;i++){
    particlesArray.push(new Particle());
  }
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particlesArray.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animate);
}

window.addEventListener('resize', ()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  initParticles();
});

initParticles();
animate();
</script>

</body>
</html>
