<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minty Portal Access</title>
<style>
  /* Background gradient */
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(-45deg, #000000, #2f2f2f, #7f7f7f, #2f2f2f);
    background-size: 400% 400%;
    animation: gradientBG 20s ease infinite;
    overflow: hidden;
    color: white;
  }

  @keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
  }

  /* Top glow effect */
  #top-glow {
    position: absolute;
    top: 0;
    left: 50%;
    width: 200%;
    height: 250px;
    transform: translateX(-50%);
    background: radial-gradient(ellipse at center, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 70%);
    filter: blur(80px);
    animation: pulseGlow 6s ease-in-out infinite;
    z-index: 1;
  }

  @keyframes pulseGlow {
    0%, 100% {opacity: 0.7;}
    50% {opacity: 1;}
  }

  /* Particle canvas */
  #particles {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  #container {
    text-align: center;
    background: rgba(0,0,0,0.75);
    padding: 50px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    width: 320px;
    z-index: 2;
  }

  h2 {
    font-weight: 400;
    margin-bottom: 20px;
    letter-spacing: 1px;
  }

  input {
    padding: 14px;
    font-size: 16px;
    margin-top: 15px;
    width: 100%;
    border: none;
    border-radius: 8px;
    outline: none;
    background: rgba(255,255,255,0.1);
    color: white;
    text-align: center;
  }

  input::placeholder {
    color: rgba(255,255,255,0.6);
  }

  button {
    padding: 14px 0;
    font-size: 16px;
    margin-top: 20px;
    cursor: pointer;
    border: none;
    border-radius: 8px;
    width: 100%;
    background: #444;
    color: white;
    font-weight: 500;
    transition: 0.3s;
  }

  button:hover {
    background: #666;
  }

  #msg {
    color: #ff4d4d;
    margin-top: 12px;
  }

  /* Loading screen */
  #loading {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: white;
    font-size: 22px;
    letter-spacing: 2px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1s ease;
    z-index: 5;
  }

  #loading.show {
    opacity: 1;
    pointer-events: all;
  }

  .loader {
    border: 4px solid rgba(255,255,255,0.2);
    border-top: 4px solid white;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
    margin-bottom: 20px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<div id="top-glow"></div>
<canvas id="particles"></canvas>

<div id="container">
  <h2>Enter Access Code</h2>
  <input type="password" id="code" placeholder="Enter code">
  <button onclick="checkCode()">Enter</button>
  <p id="msg"></p>
</div>

<div id="loading">
  <div class="loader"></div>
  <p>Loading your portal...</p>
</div>

<script>
function checkCode() {
  const input = document.getElementById('code').value;
  const loading = document.getElementById('loading');
  const msg = document.getElementById('msg');

  if (input === "1122") {
    msg.textContent = "";
    loading.classList.add("show");
    setTimeout(() => {
      window.location.href = "https://mintyportal.company.site";
    }, 2500);
  } else {
    msg.textContent = "❌ Wrong code, try again!";
  }
}

/* Particle animation */
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particles = [];

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

for (let i = 0; i < 60; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * 300, // only near top area
    size: Math.random() * 2,
    speedY: Math.random() * 0.5 + 0.2,
    opacity: Math.random() * 0.7 + 0.3
  });
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    ctx.beginPath();
    ctx.fillStyle = `rgba(255,255,255,${p.opacity})`;
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    p.y += p.speedY;
    p.opacity -= 0.001;

    if (p.y > 400 || p.opacity <= 0) {
      p.y = Math.random() * 100;
      p.x = Math.random() * canvas.width;
      p.opacity = Math.random() * 0.7 + 0.3;
    }
  });
  requestAnimationFrame(animateParticles);
}
animateParticles();
</script>

</body>
</html>
