<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Access</title>
<style>
  /* Animated black-to-gray gradient background */
  body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(-45deg, #000000, #2f2f2f, #7f7f7f, #2f2f2f);
    background-size: 400% 400%;
    animation: gradientBG 20s ease infinite;
    overflow: hidden;
  }

  @keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
  }

  canvas#particles {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  #container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 30px;
    border-radius: 15px;
    background: rgba(0,0,0,0.85);
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    color: white;
    width: 360px;
    max-width: 90%;
  }

  h2 {
    font-weight: 400;
    margin-bottom: 20px;
    letter-spacing: 1px;
  }

  input {
    padding: 12px;
    font-size: 16px;
    margin-top: 10px;
    width: 100%;
    border: none;
    border-radius: 8px;
    outline: none;
    background: rgba(255,255,255,0.1);
    color: white;
    backdrop-filter: blur(5px);
    box-sizing: border-box;
  }

  input::placeholder {
    color: rgba(255,255,255,0.6);
  }

  button {
    padding: 12px 0;
    font-size: 16px;
    margin-top: 15px;
    cursor: pointer;
    border: none;
    border-radius: 8px;
    width: 100%;
    background: #444;
    color: white;
    font-weight: 500;
    transition: 0.3s;
  }

  button:hover {
    background: #666;
  }

  #msg {
    color: #ff4d4d;
    margin-top: 12px;
    font-weight: 500;
  }
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div id="container">
  <h2>Enter Access Code</h2>
  <input type="password" id="code" placeholder="Enter code">
  <button onclick="checkCode()">Enter</button>
  <p id="msg"></p>
</div>

<script>
/* Access code check */
function checkCode() {
  const input = document.getElementById('code').value.toLowerCase();
  const msg = document.getElementById('msg');

  if(input === "garbo") {
    window.open("https://mintyportal.company.site", "_blank");
  } 
  else if(input === "yt") {
    window.open("https://www.youtube.com", "_blank");
  } 
  else if(input === "fox") {
    window.open("https://discord.com/invite/8bRMGXXqXs", "_blank");
  } 
  else if(input === "teeza") {
    window.open("https://dashboard.botghost.com/dashboard/modules", "_blank");}
  } 
  else if(input === "Movies") {
    window.open("pstream.mov", "_blank");
   } 
  else if(input === "monkey") {
    window.open("https://i.ytimg.com/vi/_QMEy8SY2OY/maxresdefault.jpg", "_blank");
  } 
  else {
    msg.textContent = "❌ Wrong code, try again!";
  }
}

/* Particle effect */
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particlesArray = [];
const colors = ['rgba(255,255,255,0.1)','rgba(255,255,255,0.2)','rgba(255,255,255,0.15)'];
const maxParticles = 100;

class Particle {
  constructor(){
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.radius = Math.random() * 2 + 1;
    this.speedX = (Math.random() - 0.5) * 0.5;
    this.speedY = (Math.random() - 0.5) * 0.5;
    this.color = colors[Math.floor(Math.random()*colors.length)];
  }
  update(){
    this.x += this.speedX;
    this.y += this.speedY;
    if(this.x < 0 || this.x > canvas.width) this.speedX = -this.speedX;
    if(this.y < 0 || this.y > canvas.height) this.speedY = -this.speedY;
  }
  draw(){
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
    ctx.fillStyle = this.color;
    ctx.fill();
  }
}

function initParticles(){
  particlesArray = [];
  for(let i=0;i<maxParticles;i++){
    particlesArray.push(new Particle());
  }
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particlesArray.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animate);
}

window.addEventListener('resize', ()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  initParticles();
});

initParticles();
animate();
</script>

</body>
</html>
